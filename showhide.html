<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Show/Hide Image</title>

    <style>
      .hide {
        display: none;
      }

      button {
        width: 10vw;
        height: 10vh;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <button id="btn">Show/Hide</button>
    <img id="imageID" src="shinchan.jfif" width="300" />

    <script>
      let abc = document.getElementById("imageID");
      let btn = document.getElementById("btn");

      btn.onclick = function () {
        abc.classList.toggle("hide");
      };
    </script>
  </body>
</html>
