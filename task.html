<!doctype html>
<html>
  <head>
    <title>Counter App</title>
  </head>
  <body>
    <h1 id="count">0</h1>

    <button onclick="increase()">+</button>
    <button onclick="decrease()">-</button>
    <button onclick="reset()">Reset</button>

    <script>
      let count = 0;

      function increase() {
        count++;
        document.getElementById("count").innerHTML = count;
      }

      function decrease() {
        count--;
        document.getElementById("count").innerHTML = count;
      }

      function reset() {
        count = 0;
        document.getElementById("count").innerHTML = count;
      }
    </script>
  </body>
</html>
