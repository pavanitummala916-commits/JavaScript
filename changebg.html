<<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Background Color</title>

    <script>
      function changeByRed() {
        document.body.style.backgroundColor = "red";
      }

      function changeByPink() {
        document.body.style.backgroundColor = "pink";
      }

      function changeByGreen() {
        document.body.style.backgroundColor = "green";
      }

      function changeByViolet() {
        document.body.style.backgroundColor = "violet";
      }
    </script>
  </head>

  <body>
    <button onclick="changeByRed()">Red</button>
    <button onclick="changeByPink()">Pink</button>
    <button onclick="changeByGreen()">Green</button>
    <button onclick="changeByViolet()">Violet</button>
  </body>
</html>
